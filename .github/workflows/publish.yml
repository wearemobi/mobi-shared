name: Release & Publish Imperial Package

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the Grand Fleet Code
        uses: actions/checkout@v4

      - name: Setup Node.js (Imperial Environment)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@wearemobi'

      - name: Install Dependencies
        run: npm install

      - name: Build the Sovereign Shared Core
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
